<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Emily Waiter App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --brand-red: #E21836; --brand-dark: #0f0f0f; --text-main: #ffffff; --text-muted: #888888; }
        body { font-family: 'Montserrat', sans-serif; background: radial-gradient(circle at top, #3a0d14 0%, var(--brand-dark) 80%); background-color: var(--brand-dark); color: var(--text-main); margin: 0; padding: 0; min-height: 100vh; overflow: hidden; }
        .main-container { width: 95%; max-width: 360px; background: rgba(15, 15, 15, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(226, 24, 54, 0.2); border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; box-sizing: border-box; max-height: 95vh; overflow-y: auto; margin: 2.5vh auto; }
        
        .neon-logo { font-family: 'Caveat', cursive; font-size: 45px; color: #fff; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px var(--brand-red); margin: 0; line-height: 1; transform: rotate(-2deg); }
        .logo-sub { font-size: 10px; letter-spacing: 3px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; margin-bottom: 20px; }
        
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .grid-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 16px; padding: 15px 5px; color: white; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .grid-btn i { font-size: 28px; font-style: normal; }
        .grid-btn:active { transform: scale(0.95); background: rgba(226, 24, 54, 0.2); border-color: var(--brand-red); }

        .menu-btn { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 14px; font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: 0.2s; outline: none; }
        .btn-primary { background-color: var(--brand-red); color: white; }
        .btn-secondary { background-color: #1e1e1e; color: white; border: 1px solid #333; }
        .btn-danger { background: none; border: 1px solid var(--brand-red); color: var(--brand-red); }

        /* СВАЙП КАРТКИ */
        .swipe-container { position: relative; width: 100%; height: 70vh; max-height: 580px; margin-bottom: 15px; }
        .swipe-card { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; border-radius: 20px; border: 1px solid rgba(226, 24, 54, 0.2); box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: flex; flex-direction: column; overflow: hidden; }
        .card-img-container { width: 100%; height: 45%; background: #0a0a0a; overflow: hidden; }
        .card-img-container img { width: 100%; height: 100%; object-fit: cover; }
        .card-body { padding: 15px; text-align: left; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .card-title { font-size: 20px; font-weight: 700; margin: 0; color: white; }
        .card-info-block { background: rgba(255,255,255,0.04); padding: 12px; border-radius: 12px; font-size: 13px; color: #ddd; }
        .card-info-title { color: #ffcc00; display: block; margin-bottom: 4px; font-weight: bold; font-size: 11px; text-transform: uppercase; }

        /* ТАБЛИЦЯ ДИВАНІВ */
        .sofa-table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        .sofa-table td { padding: 12px; border-bottom: 1px solid #333; text-align: left; }
        .sofa-date { color: var(--brand-red); font-weight: bold; width: 40%; }
        .sofa-name { color: white; font-weight: bold; }

        /* АВАТАР */
        .avatar-box { width: 80px; height: 80px; border-radius: 50%; background: #222; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 10px auto; border: 2px solid var(--brand-red); cursor: pointer; overflow: hidden; position: relative; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        
        .search-bar { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #444; background: #1a1a1a; color: white; font-family: 'Montserrat'; margin-bottom: 15px; box-sizing: border-box; }
        .search-result-item { padding: 12px; border-bottom: 1px solid #333; text-align: left; cursor: pointer; display: flex; justify-content: space-between; }

        #quizMenuContainer, #setupScreen, #quizContainer, #leaderboardContainer, #cleaningContainer, #zonesMenuContainer, #zonesHistoryContainer, #zonesInputContainer, #zonesQueueContainer, #productMainContainer, #productKitchenContainer, #swipeViewContainer, #deliveryContainer, #profileContainer, #reviewsContainer { display: none; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="mainMenu">
            <div class="neon-logo">Emily</div>
            <div class="logo-sub">Brooklyn Pizza</div>
            <h1 id="userName" style="font-size: 16px; margin-bottom: 20px; color: #ffcc00;">Завантаження...</h1>
            <div class="grid-menu">
                <button class="grid-btn" onclick="showScreen('quizMenuContainer')"><i>📝</i>Тести</button>
                <button class="grid-btn" onclick="showScreen('deliveryContainer')"><i>📦</i>Доставки</button>
                <button class="grid-btn" onclick="showScreen('cleaningContainer')"><i>🧴</i>Замиття</button>
                <button class="grid-btn" onclick="showScreen('productMainContainer')"><i>📚</i>Продакт</button>
                <button class="grid-btn" onclick="showScreen('zonesMenuContainer')"><i>🪑</i>Зони</button>
                <button class="grid-btn" onclick="openProfile()"><i>👤</i>Профіль</button>
            </div>
            <button class="menu-btn btn-secondary" onclick="showLeaderboard()">🏆 Рейтинг</button>
        </div>

        <div id="profileContainer">
            <h2 style="margin:0 0 15px 0;">Профіль</h2>
            <div class="avatar-box" onclick="document.getElementById('avatarUpload').click()">
                <div id="avatarEmoji">🍕</div>
                <img id="avatarImage" src="" style="display:none;">
            </div>
            <input type="file" id="avatarUpload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
            <h3 id="profileName" style="margin:0;">Ім'я</h3>
            <div id="profileRank" style="color:#ffcc00; font-size:12px; margin-bottom:20px;">🐣 Стажерчик</div>
            
            <div style="background:#1a1a1a; padding:15px; border-radius:15px; margin-bottom:10px; border:1px solid var(--brand-red);">
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;">
                    <span>Google Відгуки</span>
                    <b><span id="profileReviewsCount">0</span>/15</b>
                </div>
                <div style="width:100%; height:6px; background:#333; border-radius:3px; overflow:hidden;">
                    <div id="reviewsProgressBar" style="width:0%; height:100%; background:#28a745;"></div>
                </div>
                <button class="menu-btn btn-secondary" style="margin-top:10px; padding:8px; font-size:11px;" onclick="showScreen('reviewsContainer')">📸 Додати скрін</button>
            </div>

            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:15px;">
                <div style="background:#1a1a1a; padding:10px; border-radius:12px; font-size:11px;">
                    <span style="color:#888;">Змін:</span><br><b id="profileShifts">0</b>
                </div>
                <div style="background:#1a1a1a; padding:10px; border-radius:12px; font-size:11px;">
                    <span style="color:#888;">Доставки:</span><br><b>0</b>
                </div>
                <div style="background:#1a1a1a; padding:10px; border-radius:12px; font-size:11px;">
                    <span style="color:#888;">Всього XP:</span><br><b id="profileXp">0</b>
                </div>
                <div style="background:#1a1a1a; padding:10px; border-radius:12px; font-size:11px;">
                    <span style="color:#888;">Точність:</span><br><b id="profileAccuracy">0%</b>
                </div>
            </div>
            <button class="menu-btn btn-danger" onclick="showScreen('mainMenu')">Назад</button>
        </div>

        <div id="zonesQueueContainer">
            <h2 style="margin:0;">💸 Money Talk</h2>
            <p style="font-size:11px; color:#888;">Черга на дивани (22-28)</p>
            <table class="sofa-table" id="sofaScheduleTable"></table>
            <button class="menu-btn btn-secondary" style="margin-top:20px;" onclick="showScreen('zonesMenuContainer')">Назад</button>
        </div>

        <div id="productKitchenContainer">
            <h2 style="margin:0 0 15px 0;">🍔 Кухня</h2>
            <input type="text" id="menuSearchInput" class="search-bar" placeholder="🔍 Назва або склад..." onkeyup="filterMenu()">
            <div id="searchResults" style="display:none;"></div>
            <div id="dynamicCategoryList" style="display:flex; flex-direction:column; gap:10px;"></div>
            <button class="menu-btn btn-danger" style="margin-top:20px;" onclick="showScreen('productMainContainer')">Назад</button>
        </div>

        <div id="swipeViewContainer">
            <div class="category-badge" id="currentSwipeCategory">Піца</div>
            <div class="swipe-container" id="swipeContainer">
                <div class="swipe-card" id="swipeCard"></div>
            </div>
            <div class="swipe-hints">
                <button class="hint-btn" onclick="forceSwipe(-1)">⬅️</button>
                <div style="color:white; font-size:14px; font-weight:bold; display:flex; align-items:center;" id="swipeProgressText">1 / 10</div>
                <button class="hint-btn" onclick="forceSwipe(1)">➡️</button>
            </div>
            <button class="menu-btn btn-danger" onclick="showScreen('productKitchenContainer')">Вийти</button>
        </div>

        <div id="quizContainer">
            <img id="questionImage" src="" style="width:100%; border-radius:15px; margin-bottom:15px; display:none; height:180px; object-fit:cover;">
            <p id="progressText" style="color:var(--brand-red); font-size:11px; font-weight:bold;"></p>
            <div id="questionText" style="font-weight:700; margin:15px 0; font-size:16px;"></div>
            <div id="optionsContainer"></div>
        </div>

        <div id="zonesInputContainer">
            <h2 style="margin:0 0 15px 0;">✍️ Внести зони</h2>
            <input type="date" id="shiftDateInput" style="width:100%; padding:12px; border-radius:10px; background:#1a1a1a; color:white; border:1px solid #444; margin-bottom:15px;">
            <div id="dynamicAssignmentsList"></div>
            <button class="menu-btn btn-secondary" onclick="addAssignmentRow()">+ Офіціант</button>
            <button class="menu-btn btn-primary" id="saveZonesBtn" onclick="saveStructuredZones()">Внести</button>
            <button class="menu-btn btn-danger" onclick="showScreen('zonesMenuContainer')">Скасувати</button>
        </div>

        <div id="zonesHistoryContainer">
            <h2>📜 Хронологія</h2>
            <div id="historyListDisplay" style="max-height:450px; overflow-y:auto;"></div>
            <button class="menu-btn btn-secondary" onclick="showScreen('zonesMenuContainer')">Назад</button>
        </div>

        <div id="productMainContainer">
            <h2>📚 Продакт</h2>
            <button class="menu-btn btn-secondary" style="padding:20px; border-color:var(--brand-red);" onclick="openKitchenMenu()">🍔 Кухня</button>
            <button class="menu-btn btn-secondary" style="padding:20px; opacity:0.5;">🍹 Бар</button>
            <button class="menu-btn btn-danger" onclick="showScreen('mainMenu')">Назад</button>
        </div>
        
        <div id="zonesMenuContainer">
            <h2>🪑 Зони</h2>
            <button class="menu-btn btn-secondary" onclick="openZonesHistory()">📜 Хронологія</button>
            <button class="menu-btn btn-secondary" onclick="openZonesInput()">✍️ Внести зони</button>
            <button class="menu-btn btn-primary" onclick="openZonesQueue()">💸 Money Talk</button>
            <button class="menu-btn btn-danger" onclick="showScreen('mainMenu')">Назад</button>
        </div>

        <div id="reviewsContainer">
            <h2>📸 Скріни відгуків</h2>
            <div id="reviewGallery" style="display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-bottom:15px;"></div>
            <button class="menu-btn btn-secondary" onclick="document.getElementById('hiddenReviewInput').click()">Додати фото</button>
            <input type="file" id="hiddenReviewInput" accept="image/*" multiple style="display:none;" onchange="handleReviewPhotos(event)">
            <button class="menu-btn btn-primary" id="submitReviewsBtn" onclick="submitReviewsReport()" style="opacity:0.5; pointer-events:none;">Відправити</button>
            <button class="menu-btn btn-danger" onclick="openProfile()">Назад</button>
        </div>

        <div id="quizMenuContainer">
            <h2>📝 Тести</h2>
            <button class="menu-btn btn-primary" onclick="openSetup('free')">📚 Навчання</button>
            <button class="menu-btn btn-primary" onclick="openSetup('timed')">⏱ Спринт</button>
            <button class="menu-btn btn-danger" onclick="startAssessment()">🔥 Атестація</button>
            <button class="menu-btn btn-secondary" onclick="showScreen('mainMenu')">Назад</button>
        </div>

        <div id="setupScreen">
            <h1 id="setupTitle">Дистанція</h1>
            <button class="menu-btn btn-secondary" onclick="prepareQuiz(20)">20 питань</button>
            <button class="menu-btn btn-secondary" onclick="prepareQuiz(50)">50 питань</button>
            <button class="menu-btn btn-danger" onclick="showScreen('quizMenuContainer')">Назад</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let userData = tg.initDataUnsafe?.user || {first_name: "Колега", id: "0"};
        const API_URL = "https://script.google.com/macros/s/AKfycbxwXzgTnt_i5oQgmgU7zwwkbGmKDmCPG0QqFWddh3mWSv-PvzxtRns5eF78hEZllhAy/exec";
        
        let menuItems = [], globalHistory = [], allLeaders = [], globalReviews = {}, globalStats = {};
        let flatMenuArray = [], swipeCurrentIndex = 0, questions = [], currentIndex = 0, score = 0, mode = '';

        const staffNames = ["Кулик Дарія", "Олег Баб'як", "Лащук Віктор", "Пашко Ангеліна", "Цибуляк Ірина", "Павлик Марта", "Юстина Білогруд", "Юлія"];

        function showScreen(id) {
            document.querySelectorAll('.main-container > div').forEach(d => d.style.display = 'none');
            document.getElementById(id).style.display = 'block';
        }

        async function initApp() {
            showScreen('mainMenu');
            try {
                let r = await fetch(API_URL).then(res => res.json());
                menuItems = r.menu || [];
                globalHistory = r.zoneHistory || [];
                globalReviews = r.reviews || {};
                globalStats = r.stats || {};
                
                let l = await fetch(API_URL + "?action=leaderboard").then(res => res.json());
                allLeaders = l;
                window.myStats = allLeaders.find(u => String(u.tg_id) === String(userData.id)) || {name: userData.first_name, xp:0, avatar:""};
                
                document.getElementById('userName').innerText = "Hi, " + userData.first_name + "!";
                document.getElementById('userName').style.color = "#fff";
            } catch(e) { document.getElementById('userName').innerText = "Помилка зв'язку"; }
        }
        initApp();

        function openProfile() {
            let me = window.myStats;
            const imgEl = document.getElementById('avatarImage');
            const emojiEl = document.getElementById('avatarEmoji');
            if (me.avatar) { imgEl.src = "data:image/jpeg;base64," + me.avatar; imgEl.style.display = 'block'; emojiEl.style.display = 'none'; }
            else { 
                const ems = ['🍕','🔥','😎','👨‍🍳','💸','🤌'];
                emojiEl.innerText = ems[Math.floor(Math.random()*ems.length)];
                imgEl.style.display = 'none'; emojiEl.style.display = 'block';
            }
            document.getElementById('profileName').innerText = me.name;
            document.getElementById('profileXp').innerText = me.xp;
            let revs = globalReviews[me.name] || 0;
            document.getElementById('profileReviewsCount').innerText = revs;
            document.getElementById('reviewsProgressBar').style.width = Math.min(100, (revs/15)*100) + '%';
            document.getElementById('profileShifts').innerText = globalStats[me.name]?.shifts || 0;
            showScreen('profileContainer');
        }

        async function handleAvatarUpload(e) {
            let file = e.target.files[0]; if(!file) return;
            let base64 = await compressImage(file, 200, 0.6);
            fetch(API_URL, {method:'POST', body: JSON.stringify({action:'saveAvatar', tg_id:userData.id, avatarBase64:base64})});
            window.myStats.avatar = base64; openProfile();
        }

        function openKitchenMenu() {
            let cats = [...new Set(menuItems.map(i => i.category))];
            document.getElementById('dynamicCategoryList').innerHTML = cats.map(c => `
                <button class="menu-btn btn-secondary" style="display:flex; justify-content:space-between;" onclick="startSwipe('${c}')">
                    <span>🍽 ${c}</span><span>➔</span>
                </button>
            `).join('');
            showScreen('productKitchenContainer');
        }

        function startSwipe(cat) {
            flatMenuArray = menuItems;
            swipeCurrentIndex = flatMenuArray.findIndex(i => i.category === cat);
            renderSwipe(); showScreen('swipeViewContainer');
        }

        function renderSwipe() {
            let item = flatMenuArray[swipeCurrentIndex];
            let catItems = flatMenuArray.filter(i => i.category === item.category);
            let relIdx = catItems.findIndex(i => i.name === item.name) + 1;
            
            document.getElementById('currentSwipeCategory').innerText = item.category;
            document.getElementById('swipeProgressText').innerText = relIdx + " / " + catItems.length;
            
            document.getElementById('swipeCard').innerHTML = `
                <div class="card-img-container">${item.photo ? `<img src="${item.photo}">` : '<div style="font-size:50px; padding:40px;">🍽</div>'}</div>
                <div class="card-body">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 class="card-title">${item.name}</h2>
                        <span style="font-size:12px; color:var(--brand-red); font-weight:bold;">${item.weight}</span>
                    </div>
                    <div class="card-info-block"><span class="card-info-title">🧀 Склад</span>${item.ingredients}</div>
                    <div class="card-info-block"><span class="card-info-title">📖 Опис</span>${item.desc}</div>
                    ${item.allergens ? `<div style="font-size:11px; color:#ff4444; font-style:italic;">⚠️ ${item.allergens}</div>` : ''}
                </div>
            `;
        }

        function forceSwipe(dir) {
            swipeCurrentIndex += dir;
            if(swipeCurrentIndex < 0) swipeCurrentIndex = 0;
            if(swipeCurrentIndex >= flatMenuArray.length) swipeCurrentIndex = flatMenuArray.length - 1;
            renderSwipe();
        }

        function openZonesQueue() {
            let html = "";
            let start = new Date(2026, 3, 25);
            let now = new Date(); now.setHours(0,0,0,0);
            let count = 0;
            let d = new Date(start);
            let cycleIdx = 0;

            while(count < 16) {
                if(d.getDay() === 6 || d.getDay() === 0) {
                    if(d >= now) {
                        html += `<tr><td class="sofa-date">${d.getDate().toString().padStart(2,'0')}.${(d.getMonth()+1).toString().padStart(2,'0')}</td><td class="sofa-name">${staffNames[cycleIdx % staffNames.length]}</td></tr>`;
                        count++;
                    }
                    cycleIdx++;
                }
                d.setDate(d.getDate()+1);
            }
            document.getElementById('sofaScheduleTable').innerHTML = html;
            showScreen('zonesQueueContainer');
        }

        function openZonesHistory() {
            let h = "";
            let dates = [...new Set(globalHistory.map(i => i.date))].reverse();
            dates.forEach(d => {
                h += `<div class="history-card"><div class="history-date">📅 ${d}</div>`;
                globalHistory.filter(i => i.date === d).forEach(r => {
                    h += `<div class="history-row"><span>${r.name}</span><b>${r.zone}</b></div>`;
                });
                h += `</div>`;
            });
            document.getElementById('historyListDisplay').innerHTML = h || "Пусто";
            showScreen('zonesHistoryContainer');
        }

        function addAssignmentRow() {
            let div = document.createElement('div');
            div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '10px';
            div.innerHTML = `
                <select style="flex:1; padding:10px; border-radius:8px; background:#222; color:white;">${staffNames.map(n => `<option>${n}</option>`).join('')}</select>
                <input type="text" placeholder="Зона" style="width:80px; padding:10px; border-radius:8px; background:#222; color:white; border:1px solid #444;">
                <button onclick="this.parentElement.remove()" style="background:none; border:none; color:red;">✕</button>
            `;
            document.getElementById('dynamicAssignmentsList').appendChild(div);
        }

        async function saveStructuredZones() {
            let date = document.getElementById('shiftDateInput').value; if(!date) return alert("Дата!");
            let assigns = [];
            document.querySelectorAll('#dynamicAssignmentsList > div').forEach(row => {
                assigns.push({name: row.querySelector('select').value, zone: row.querySelector('input').value});
            });
            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'saveStructuredZones', date:date, assignments:assigns})});
            alert("Збережено!"); initApp();
        }

        // --- ВІДГУКИ ---
        let reviewPhotos = [];
        function handleReviewPhotos(e) {
            reviewPhotos = Array.from(e.target.files);
            document.getElementById('reviewGallery').innerHTML = reviewPhotos.map(f => `<img src="${URL.createObjectURL(f)}" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:5px;">`).join('');
            let btn = document.getElementById('submitReviewsBtn');
            btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
        }

        async function submitReviewsReport() {
            let btn = document.getElementById('submitReviewsBtn'); btn.innerText = "⏳";
            let photos = [];
            for(let f of reviewPhotos) { photos.push({mimeType:'image/jpeg', data: await compressImage(f, 800, 0.6)}); }
            await fetch(API_URL, {method:'POST', body: JSON.stringify({action:'submitReviews', name:window.myStats.name, photos:photos})});
            alert("Відправлено!"); location.reload();
        }

        function compressImage(file, max, qual) {
            return new Promise(res => {
                let reader = new FileReader(); reader.readAsDataURL(file);
                reader.onload = e => {
                    let img = new Image(); img.src = e.target.result;
                    img.onload = () => {
                        let w = img.width, h = img.height;
                        if(w > max) { h *= max/w; w = max; }
                        let canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        res(canvas.toDataURL('image/jpeg', qual).split(',')[1]);
                    }
                }
            });
        }
        
        // Пошук
        function filterMenu() {
            let q = document.getElementById('menuSearchInput').value.toLowerCase();
            let res = document.getElementById('searchResults');
            if(q.length < 1) { res.style.display = 'none'; return; }
            let matches = menuItems.filter(i => i.name.toLowerCase().includes(q) || i.ingredients.toLowerCase().includes(q)).slice(0, 5);
            res.innerHTML = matches.map(m => `<div class="search-result-item" onclick="startSwipeAt('${m.name}')"><b>${m.name}</b><small>${m.category}</small></div>`).join('');
            res.style.display = 'block';
        }
        function startSwipeAt(name) {
            flatMenuArray = menuItems;
            swipeCurrentIndex = flatMenuArray.findIndex(i => i.name === name);
            renderSwipe(); showScreen('swipeViewContainer');
        }

        // ТЕСТИ
        function openSetup(m) { mode = m; showScreen('setupScreen'); }
        async function prepareQuiz(num) {
            let data = await fetch(API_URL + "?action=getQuestions").then(res => res.json());
            questions = data.questions.sort(() => 0.5 - Math.random()).slice(0, num);
            currentIndex = 0; score = 0; showQuestion(); showScreen('quizContainer');
        }
        function showQuestion() {
            if(currentIndex >= questions.length) { alert("Кінець! Правильно: " + score); showScreen('mainMenu'); return; }
            let q = questions[currentIndex];
            document.getElementById('progressText').innerText = (currentIndex+1) + " / " + questions.length;
            document.getElementById('questionText').innerText = q.question;
            document.getElementById('optionsContainer').innerHTML = q.options.map((o, i) => `
                <button class="menu-btn btn-secondary" onclick="checkAnswer(${i+1}, ${q.correct_answer}, this)">${o}</button>
            `).join('');
        }
        function checkAnswer(ans, corr, btn) {
            if(ans == corr) { score++; btn.style.background = '#28a745'; }
            else { btn.style.background = '#dc3545'; }
            setTimeout(() => { currentIndex++; showQuestion(); }, 1200);
        }
    </script>
</body>
</html>
